<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayuntamiento de Esperanza - Cheques</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <main class="app">
    <section class="panel no-print">
      <img src="logo.png" class="logo-panel" alt="Logo">
      <h1>Ayuntamiento de Esperanza</h1>
      <h2>Cheques</h2>

      <div class="grid">
        <label>Cliente <input id="cliente" type="text" placeholder="Nombre del cliente"></label>
        <label>Cédula <input id="cedula" type="text" maxlength="13" placeholder="000-0000000-0" oninput="formatearCedula(this)"></label>
      </div>

      <div class="actions">
        <button id="btnAgregar" onclick="agregar()">Agregar</button>
        <button onclick="imprimir()">Imprimir PDF</button>
        <button id="btnCompartirPDF" onclick="compartirPDF()">Compartir PDF</button>
        <button onclick="exportarCSV()">Exportar CSV</button>

        <label class="import-button">
  Importar tabla
  <input
    id="importarArchivo"
    type="file"
    accept=".csv"
    onchange="importarCSV(event)"
    hidden
  >
</label>
        
        <button class="secondary" onclick="limpiarFormulario()">Limpiar campos</button>
        <button class="danger" onclick="limpiarTodo()">Borrar todo</button>
      </div>

      <input id="buscar" class="search" type="text" placeholder="Buscar cliente o cédula..." oninput="renderizar()">
      <p class="hint">Los registros se guardan automáticamente en este navegador.</p>
    </section>

    <section class="sheet-wrap">
      <div class="sheet">
        <header class="doc-header">
          <img src="logo.png" class="logo-doc" alt="Logo">
          <h2>AYUNTAMIENTO DE ESPERANZA</h2>
          <h3>CHEQUES</h3>
        </header>

        <table class="cheques-table">
          <colgroup>
            <col class="col-num">
            <col class="col-cliente">
            <col class="col-cedula">
            <col class="col-accion no-print">
          </colgroup>
          <thead>
            <tr>
              <th>#</th>
              <th>CLIENTE</th>
              <th>CÉDULA</th>
              <th class="no-print accion-title">ACCIÓN</th>
            </tr>
          </thead>
          <tbody id="tabla"></tbody>
        </table>
      </div>
    </section>
  </main>
  
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>
<script src="script.js"></script>
</body>
</html>
